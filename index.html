<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>🎹 JY PIANO 연습실</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Jua&family=Do+Hyeon&family=Nanum+Gothic:wght@400;700&display=swap');
:root{--primary:#FF6B6B;--secondary:#4ECDC4;--accent:#FFE66D;--correct:#51CF66;--wrong:#FF6B6B;--waiting:#A5D8FF;--bg:#FFF8F0;--text:#2D3436;--bar-h:60px;}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
body{font-family:'Nanum Gothic',sans-serif;background:var(--bg);min-height:100vh;overflow-x:hidden;}
#top-bar{position:fixed;top:0;left:0;right:0;height:var(--bar-h);background:linear-gradient(135deg,#FF6B6B,#FF8E53);display:flex;align-items:center;justify-content:space-between;padding:0 14px;z-index:999;box-shadow:0 3px 16px rgba(255,107,107,0.35);}
.bar-brand{display:flex;flex-direction:column;line-height:1.2;}
.bar-brand .b1{font-family:'Do Hyeon',sans-serif;font-size:1.05rem;color:#fff;letter-spacing:1px;}
.bar-brand .b2{font-size:0.62rem;color:rgba(255,255,255,0.82);font-family:'Nanum Gothic',sans-serif;letter-spacing:0.5px;}
.bar-right{display:flex;align-items:center;gap:6px;}
#bar-timer{font-family:'Do Hyeon',sans-serif;font-size:1.15rem;color:#fff;min-width:48px;text-align:center;letter-spacing:1px;}
#bar-count{background:rgba(255,255,255,0.25);border-radius:20px;padding:3px 9px;font-family:'Jua',sans-serif;font-size:0.72rem;color:#fff;white-space:nowrap;}
.bar-btn{width:30px;height:30px;border-radius:50%;border:none;cursor:pointer;font-size:0.8rem;display:flex;align-items:center;justify-content:center;transition:all 0.2s;box-shadow:0 2px 8px rgba(0,0,0,0.15);}
.bar-btn:active{transform:scale(0.88);}
#bbPlay{background:#fff;color:var(--primary);}
#bbPause{background:rgba(255,255,255,0.28);color:#fff;}
#bbStop{background:rgba(255,255,255,0.18);color:#fff;}
.page{display:none;min-height:100vh;padding-top:var(--bar-h);}
.page.active{display:block;}
.page-inner{padding:20px 14px 50px;}
.back-btn{display:inline-flex;align-items:center;gap:5px;background:none;border:none;cursor:pointer;font-family:'Jua',sans-serif;font-size:0.88rem;color:#888;padding:6px 2px;margin-bottom:14px;}
.big-btn{width:100%;padding:15px;border:none;border-radius:16px;color:#fff;font-family:'Jua',sans-serif;font-size:1.1rem;cursor:pointer;transition:all 0.2s;display:flex;align-items:center;justify-content:center;gap:8px;margin-top:8px;}
.big-btn:active{transform:scale(0.97);}
.btn-primary{background:linear-gradient(135deg,var(--primary),#FF8E53);box-shadow:0 5px 16px rgba(255,107,107,0.3);}
.section-title{font-family:'Jua',sans-serif;font-size:1.1rem;color:var(--text);margin-bottom:14px;}
.empty-msg{text-align:center;padding:32px;color:#bbb;font-size:0.88rem;}
.tag{display:inline-block;padding:3px 9px;border-radius:99px;font-size:0.63rem;font-weight:700;margin:2px;}
.tag-book{background:#E3F2FD;color:#1565C0;}
.tag-genre{background:#F3E5F5;color:#6A1B9A;}
.tag-level.lv1{background:#D3F9D8;color:#2f9e44;}
.tag-level.lv2{background:#FFF3BF;color:#e67700;}
.tag-level.lv3{background:#FFE3E3;color:#c92a2a;}
.tag-hands{background:#FFF0F6;color:#C2255C;}
#pg-home{background:linear-gradient(160deg,#FFF0E6,#E8F8F7);}
.home-hero{text-align:center;padding:22px 16px 14px;}
.home-hero .logo{font-family:'Do Hyeon',sans-serif;font-size:2rem;color:var(--primary);letter-spacing:2px;margin-bottom:2px;}
.home-hero .sub{font-size:0.8rem;color:#aaa;letter-spacing:1px;}
.search-bar{position:relative;margin-bottom:14px;}
.search-bar input{width:100%;padding:12px 44px 12px 16px;border:2px solid #eee;border-radius:14px;font-family:'Nanum Gothic',sans-serif;font-size:0.9rem;background:#fff;outline:none;transition:border-color 0.2s;}
.search-bar input:focus{border-color:var(--secondary);}
.search-bar .s-ico{position:absolute;right:13px;top:50%;transform:translateY(-50%);background:none;border:none;font-size:1rem;}
.cat-tabs{display:flex;gap:7px;overflow-x:auto;padding-bottom:6px;margin-bottom:14px;-webkit-overflow-scrolling:touch;}
.cat-tabs::-webkit-scrollbar{display:none;}
.cat-tab{flex-shrink:0;padding:7px 15px;border-radius:99px;border:2px solid #eee;background:#fff;font-family:'Jua',sans-serif;font-size:0.8rem;color:#888;cursor:pointer;transition:all 0.2s;white-space:nowrap;}
.cat-tab.active{border-color:var(--primary);background:var(--primary);color:#fff;}
.cat-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:16px;}
.cat-card{background:#fff;border-radius:16px;padding:16px 12px;text-align:center;cursor:pointer;border:2px solid transparent;transition:all 0.2s;box-shadow:0 3px 12px rgba(0,0,0,0.07);}
.cat-card:active{transform:scale(0.95);}
.cc-icon{font-size:1.7rem;margin-bottom:6px;}
.cc-name{font-family:'Jua',sans-serif;font-size:0.86rem;color:var(--text);}
.cc-cnt{font-size:0.66rem;color:#aaa;margin-top:3px;}
.search-result-item{background:#fff;border-radius:13px;padding:12px 14px;display:flex;align-items:center;gap:10px;cursor:pointer;box-shadow:0 3px 10px rgba(0,0,0,0.06);margin-bottom:8px;}
#pg-songs{background:var(--bg);}
.filter-chips{display:flex;gap:6px;overflow-x:auto;padding-bottom:6px;margin-bottom:12px;-webkit-overflow-scrolling:touch;}
.filter-chips::-webkit-scrollbar{display:none;}
.filter-chip{flex-shrink:0;padding:5px 12px;border-radius:99px;border:2px solid #eee;background:#fff;font-family:'Jua',sans-serif;font-size:0.73rem;color:#888;cursor:pointer;transition:all 0.2s;}
.filter-chip.on{border-color:var(--secondary);background:var(--secondary);color:#fff;}
.song-item{background:#fff;border-radius:13px;padding:12px 13px;display:flex;align-items:center;gap:10px;cursor:pointer;border:2px solid transparent;transition:all 0.2s;box-shadow:0 3px 10px rgba(0,0,0,0.06);margin-bottom:8px;}
.song-item:active{transform:scale(0.98);}
.song-item.sel{border-color:var(--secondary);background:#F0FDFB;}
.si-emoji{font-size:1.5rem;}
.si-info{flex:1;min-width:0;}
.si-name{font-family:'Jua',sans-serif;font-size:0.88rem;color:var(--text);}
.si-tags{display:flex;flex-wrap:wrap;gap:3px;margin-top:4px;}
.modal-bg{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.45);z-index:1000;align-items:flex-end;justify-content:center;}
.modal-bg.show{display:flex;}
.modal-box{background:#fff;border-radius:24px 24px 0 0;padding:24px 20px 36px;width:100%;max-width:540px;animation:slideUp 0.3s;}
@keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
.modal-title{font-family:'Jua',sans-serif;font-size:1.1rem;color:var(--text);margin-bottom:18px;text-align:center;}
.hands-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:16px;}
.hands-card{border:3px solid #eee;border-radius:18px;padding:22px 10px;text-align:center;cursor:pointer;transition:all 0.2s;background:#fafafa;}
.hands-card:active{transform:scale(0.95);}
.hands-card.sel{border-color:var(--secondary);background:#F0FDFB;}
.hc-ico{font-size:2rem;margin-bottom:8px;}
.hc-name{font-family:'Jua',sans-serif;font-size:0.95rem;color:var(--text);}
.hc-sub{font-size:0.72rem;color:#aaa;margin-top:4px;}
.modal-close{width:100%;padding:13px;border:none;border-radius:14px;background:#f1f3f5;font-family:'Jua',sans-serif;font-size:0.9rem;color:#868e96;cursor:pointer;}
#pg-set{background:linear-gradient(160deg,#F0FDFB,#FFF8F0);}
.scard{background:#fff;border-radius:16px;padding:16px;margin-bottom:12px;box-shadow:0 4px 14px rgba(0,0,0,0.07);}
.scard h3{font-family:'Jua',sans-serif;font-size:0.92rem;color:var(--text);margin-bottom:11px;}
.count-row{display:flex;align-items:center;gap:14px;justify-content:center;}
.cnt-btn{width:40px;height:40px;border-radius:50%;border:none;font-size:1.3rem;cursor:pointer;background:var(--secondary);color:#fff;display:flex;align-items:center;justify-content:center;transition:all 0.2s;}
.cnt-btn:active{transform:scale(0.88);}
#cnt-disp{font-family:'Jua',sans-serif;font-size:1.9rem;color:var(--primary);min-width:52px;text-align:center;}
.tol-row{display:flex;align-items:center;gap:10px;}
.tol-row label{font-size:0.78rem;color:#666;font-weight:700;min-width:66px;}
input[type=range]{flex:1;accent-color:var(--secondary);}
.tol-v{font-family:'Jua',sans-serif;font-size:0.8rem;color:var(--secondary);min-width:40px;text-align:right;}
.prev-box{background:#f8f8f8;border-radius:10px;padding:12px;margin-top:8px;}
.prev-name{font-family:'Jua',sans-serif;font-size:0.92rem;color:var(--text);margin-bottom:5px;}
.prev-tags{display:flex;flex-wrap:wrap;gap:3px;margin-bottom:4px;}
.prev-info{font-size:0.72rem;color:#aaa;}
#pg-prac{background:var(--bg);}
.pcard{background:#fff;border-radius:16px;box-shadow:0 4px 14px rgba(0,0,0,0.07);padding:14px;margin-bottom:11px;}
.pcard-t{font-family:'Jua',sans-serif;font-size:0.88rem;color:var(--text);margin-bottom:9px;}
.score-section{margin-bottom:12px;}
.score-label{font-family:'Jua',sans-serif;font-size:0.75rem;padding:3px 10px;border-radius:99px;display:inline-block;margin-bottom:5px;}
.score-label.right{background:#E3F2FD;color:#1565C0;}
.score-label.left{background:#FFF3BF;color:#e67700;}
.score-wrap{width:100%;background:#f9f9f9;border-radius:10px;padding:6px 5px;overflow-x:auto;}
.score-wrap svg{display:block;}
.note-bar{display:flex;gap:4px;flex-wrap:wrap;margin-top:8px;}
.note-chip{display:flex;flex-direction:column;align-items:center;gap:2px;}
.note-dot{width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-family:'Jua',sans-serif;font-size:0.68rem;color:#fff;transition:all 0.25s;box-shadow:0 2px 6px rgba(0,0,0,0.1);}
.note-dot.waiting{background:var(--waiting);}
.note-dot.current{background:#f59f00;transform:scale(1.2);box-shadow:0 0 0 4px rgba(245,159,0,0.3);animation:pulse 1s infinite;}
.note-dot.correct{background:var(--correct);}
.note-dot.wrong{background:var(--wrong);animation:shake 0.4s;}
.note-lbl{font-size:0.56rem;color:#bbb;font-weight:700;}
@keyframes pulse{0%,100%{box-shadow:0 0 0 4px rgba(245,159,0,0.3)}50%{box-shadow:0 0 0 8px rgba(245,159,0,0.08)}}
@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-4px)}75%{transform:translateX(4px)}}
.prog-wrap{height:7px;background:#eee;border-radius:99px;margin-top:9px;overflow:hidden;}
.prog-bar{height:100%;background:linear-gradient(90deg,var(--secondary),var(--correct));border-radius:99px;transition:width 0.4s;width:0%;}
.detect-row{display:flex;gap:9px;flex-wrap:wrap;}
.detect-box{flex:1;min-width:115px;background:linear-gradient(135deg,#f0f8ff,#e8f4fd);border:2px solid #d0e8f8;border-radius:12px;padding:12px;text-align:center;}
.big-note{font-family:'Do Hyeon',sans-serif;font-size:1.8rem;color:var(--secondary);}
.hz-txt{font-size:0.68rem;color:#aaa;margin-top:2px;}
.mic-row{display:flex;align-items:center;justify-content:center;gap:4px;margin-top:4px;}
.mic-dot{width:8px;height:8px;border-radius:50%;background:#ddd;}
.mic-dot.on{background:#ff4444;animation:blink 0.8s infinite;}
@keyframes blink{0%,100%{opacity:1}50%{opacity:0.3}}
.mic-lbl{font-size:0.68rem;color:#aaa;}
.stat-box{flex:1;min-width:115px;border-radius:12px;padding:12px;text-align:center;transition:all 0.3s;background:#f9f9f9;border:2px solid #eee;}
.stat-box.ok{background:linear-gradient(135deg,#d3f9d8,#b2f2bb);border-color:#69db7c;}
.stat-box.ng{background:linear-gradient(135deg,#ffe3e3,#ffc9c9);border-color:#ff8787;}
.stat-box.go{background:linear-gradient(135deg,#fff9db,#ffec99);border-color:#ffd43b;}
.s-em{font-size:1.5rem;}.s-tx{font-family:'Jua',sans-serif;font-size:0.85rem;color:var(--text);margin-top:3px;}
.done-banner{display:none;margin-top:9px;background:linear-gradient(135deg,#51CF66,#38d9cc);color:#fff;font-family:'Jua',sans-serif;font-size:1rem;border-radius:12px;padding:13px;text-align:center;}
.done-banner.show{display:block;animation:pop 0.4s;}
@keyframes pop{from{transform:scale(0.7);opacity:0}to{transform:scale(1);opacity:1}}
.ses-row{display:flex;gap:6px;flex-wrap:wrap;margin-top:5px;}
.ses-dot{width:26px;height:26px;border-radius:50%;font-family:'Jua',sans-serif;font-size:0.65rem;display:flex;align-items:center;justify-content:center;transition:all 0.3s;background:#e9ecef;color:#aaa;}
.ses-dot.done{background:var(--correct);color:#fff;}
.ses-dot.curr{background:var(--accent);color:var(--text);border:2px solid #ffd43b;}
.mic-go-btn{width:100%;padding:13px;border:none;border-radius:13px;background:linear-gradient(135deg,var(--secondary),#38d9cc);color:#fff;font-family:'Jua',sans-serif;font-size:1rem;cursor:pointer;box-shadow:0 4px 14px rgba(78,205,196,0.3);transition:all 0.2s;display:flex;align-items:center;justify-content:center;gap:7px;margin-top:9px;}
.mic-go-btn:active{transform:scale(0.97);}
.mic-go-btn:disabled{background:#ccc;box-shadow:none;cursor:default;}
</style>
</head>
<body>
<div id="top-bar">
  <div class="bar-brand"><div class="b1">🎹 JY PIANO</div><div class="b2" id="bar-song">연습실</div></div>
  <div class="bar-right">
    <div id="bar-count" style="display:none">1/3회</div>
    <div id="bar-timer" style="display:none">00:00</div>
    <div id="bar-ctrl" style="display:flex;gap:5px;align-items:center;visibility:hidden">
      <button class="bar-btn" id="bbPlay" onclick="bbPlay()">▶</button>
      <button class="bar-btn" id="bbPause" onclick="bbPause()">⏸</button>
      <button class="bar-btn" id="bbStop" onclick="bbStop()">⏹</button>
    </div>
  </div>
</div>
<div id="pg-home" class="page active">
  <div class="home-hero"><div class="logo">JY PIANO</div><div class="sub">연습실</div></div>
  <div class="page-inner" style="padding-top:6px">
    <div class="search-bar"><input id="home-search" type="text" placeholder="곡 이름으로 검색..." oninput="liveSearch()"><button class="s-ico">🔍</button></div>
    <div id="live-results" style="margin-bottom:10px"></div>
    <div class="cat-tabs">
      <div class="cat-tab active" onclick="switchCatTab('book',this)">📚 교재</div>
      <div class="cat-tab" onclick="switchCatTab('genre',this)">🎵 장르</div>
      <div class="cat-tab" onclick="switchCatTab('level',this)">⭐ 난이도</div>
      <div class="cat-tab" onclick="switchCatTab('hands',this)">🤲 연주방식</div>
    </div>
    <div class="cat-grid" id="cat-grid"></div>
  </div>
</div>
<div id="pg-songs" class="page">
  <div class="page-inner">
    <button class="back-btn" onclick="gotoHome()">← 홈으로</button>
    <div class="section-title" id="songs-title">곡 목록</div>
    <div class="filter-chips" id="filter-chips"></div>
    <div id="song-list"></div>
    <button class="big-btn btn-primary" onclick="openHandsModal()">다음 →</button>
  </div>
</div>
<div class="modal-bg" id="hands-modal">
  <div class="modal-box">
    <div class="modal-title">🎹 연주 방식을 선택해주세요</div>
    <div class="hands-grid">
      <div class="hands-card" id="hc-right" onclick="selectHands('right')"><div class="hc-ico">🤚</div><div class="hc-name">오른손</div><div class="hc-sub">멜로디 연습</div></div>
      <div class="hands-card" id="hc-both" onclick="selectHands('both')"><div class="hc-ico">🤲</div><div class="hc-name">양손</div><div class="hc-sub">멜로디 + 반주</div></div>
    </div>
    <button class="modal-close" onclick="closeHandsModal()">취소</button>
  </div>
</div>
<div id="pg-set" class="page">
  <div class="page-inner">
    <button class="back-btn" onclick="showPage('pg-songs')">← 뒤로</button>
    <div class="section-title">⚙️ 연습 설정</div>
    <div class="scard"><h3>🔁 연습 횟수</h3>
      <div class="count-row"><button class="cnt-btn" onclick="chgCnt(-1)">−</button><div id="cnt-disp">3</div><button class="cnt-btn" onclick="chgCnt(1)">+</button></div>
      <p style="text-align:center;font-size:0.72rem;color:#aaa;margin-top:7px">같은 곡을 반복 연습할 횟수</p>
    </div>
    <div class="scard"><h3>🎛 조율 보정</h3>
      <div class="tol-row"><label>오차 허용</label><input type="range" id="tol" min="20" max="100" value="50"><div class="tol-v" id="tol-v">±50¢</div></div>
      <p style="font-size:0.7rem;color:#aaa;margin-top:7px">피아노 조율이 약간 안맞을 때 올려주세요</p>
    </div>
    <div class="scard"><h3>🎼 선택한 곡</h3><div class="prev-box" id="prev-box"></div></div>
    <button class="big-btn btn-primary" onclick="goPrac()">🎹 연습 시작!</button>
  </div>
</div>
<div id="pg-prac" class="page">
  <div class="page-inner">
    <button class="back-btn" onclick="gotoHome()">← 홈으로</button>
    <div class="pcard"><div class="pcard-t">📋 연습 진행</div><div class="ses-row" id="ses-row"></div></div>
    <div class="pcard">
      <div class="pcard-t" id="score-t">🎼 악보</div>
      <div id="score-area"></div>
      <div class="note-bar" id="note-bar"></div>
      <div class="prog-wrap"><div class="prog-bar" id="prog-bar"></div></div>
    </div>
    <div class="pcard">
      <div class="pcard-t">🎤 음정 감지</div>
      <div class="detect-row">
        <div class="detect-box"><div class="big-note" id="det-note">—</div><div class="hz-txt" id="det-hz">마이크를 켜주세요</div><div class="mic-row"><div class="mic-dot" id="mic-dot"></div><span class="mic-lbl" id="mic-lbl">꺼짐</span></div></div>
        <div class="stat-box" id="sbox"><div class="s-em" id="s-em">🎵</div><div class="s-tx" id="s-tx">시작해볼까요?</div></div>
      </div>
      <div class="done-banner" id="done-banner">🎉 완료!</div>
      <button class="mic-go-btn" id="mic-go-btn" onclick="startMic()">🎤 마이크 켜고 연습 시작</button>
    </div>
  </div>
</div>

function drawStave(containerId,notes,noteStates){const wrap=document.getElementById(containerId);if(!wrap||!notes.length)return;wrap.innerHTML='';if(typeof Vex==='undefined'){wrap.innerHTML='<p style="color:#bbb;padding:10px">로딩 중...</p>';return;}try{const VF=Vex.Flow,bpm=curSong.bpm||4;const measures=[];let mArr=[],mBeats=0;notes.forEach((n,i)=>{const v=n.dur==='h'?2:n.dur==='w'?4:1;mArr.push(i);mBeats+=v;if(mBeats>=bpm){measures.push([...mArr]);mArr=[];mBeats=0;}});if(mArr.length)measures.push(mArr);const cW=Math.max(wrap.clientWidth||300,300);const CW=28,TW=24,MG=5,MW=105;const mpr=Math.max(1,Math.floor((cW-CW-TW-MG*2)/MW));const rows=[];for(let i=0;i<measures.length;i+=mpr)rows.push(measures.slice(i,i+mpr));const RH=95,totalH=rows.length*RH+20;const renderer=new VF.Renderer(wrap,VF.Renderer.Backends.SVG);renderer.resize(cW,totalH);const ctx=renderer.getContext();rows.forEach((rowM,ri)=>{const y=ri*RH+10,isFirst=ri===0;const hW=isFirst?CW+TW:CW;const aW=cW-MG*2-hW;const mW=Math.floor(aW/rowM.length);let x=MG;rowM.forEach((idxArr,mi)=>{const fm=mi===0,sw=fm?mW+hW:mW;const stave=new VF.Stave(x,y,sw);if(fm)stave.addClef('treble');if(isFirst&&fm)stave.addTimeSignature(bpm+'/4');stave.setContext(ctx).draw();let bs=0;idxArr.forEach(i=>{bs+=notes[i].dur==='h'?2:notes[i].dur==='w'?4:1;});const sn=idxArr.map(i=>{const n=notes[i];const s=new VF.StaveNote({clef:'treble',keys:[n.vex],duration:n.dur});const st=noteStates?noteStates[i]:'waiting';const c=st==='current'?'#f59f00':st==='correct'?'#2f9e44':st==='wrong'?'#e03131':'#74C0FC';s.setStyle({fillStyle:c,strokeStyle:c});return s;});const v=new VF.Voice({num_beats:bs,beat_value:4}).setStrict(false);v.addTickables(sn);new VF.Formatter().joinVoices([v]).format([v],sw-18);v.draw(ctx,stave);x+=sw;});});}catch(e){wrap.innerHTML='<p style="color:#e03131;padding:10px;font-size:0.75rem">악보 오류: '+e.message+'</p>';}}

function redraw(){if(typeof Vex!=='undefined')drawStave('sw-right',curSong.right,states);drawNoteBar();}
function detectPitch(buf,sr){const half=buf.length>>1;const yin=new Float32Array(half);yin[0]=1;let run=0;for(let t=1;t<half;t++){let s=0;for(let j=0;j<half;j++){const d=buf[j]-buf[j+t];s+=d*d;}run+=s;yin[t]=s*t/run;}for(let t=2;t<half;t++){if(yin[t]<0.15){while(t+1<half&&yin[t+1]<yin[t])t++;return sr/t;}}return -1;}
function noteFromFreq(f){const n=['C','C#','D','D#','E','F','F#','G','G#','A','A#','B'];const m=Math.round(12*Math.log2(f/440)+49);return n[((m-1)%12+12)%12]+Math.floor((m-1)/12);}
function detectLoop(){if(!listening)return;if(paused){rafId=requestAnimationFrame(detectLoop);return;}const buf=new Float32Array(analyser.fftSize);analyser.getFloatTimeDomainData(buf);let rms=0;for(const v of buf)rms+=v*v;rms=Math.sqrt(rms/buf.length);if(rms>0.01){const freq=detectPitch(buf,audioCtx.sampleRate);if(freq>50&&freq<2000){document.getElementById('det-note').textContent=noteFromFreq(freq);document.getElementById('det-hz').textContent=freq.toFixed(1)+' Hz';if(cur<curNotes.length){const cents=Math.abs(1200*Math.log2(freq/curNotes[cur].freq));const tol=+document.getElementById('tol').value;if(cents<=tol){const now=Date.now();if(now-lastOkT>500){lastOkT=now;states[cur]='correct';cur++;clearTimeout(wrongTid);if(cur<curNotes.length){states[cur]='current';setStatus('ok');setTimeout(()=>setStatus('go'),600);}else onComplete();redraw();}}else if(states[cur]==='current'){states[cur]='wrong';setStatus('ng');redraw();clearTimeout(wrongTid);wrongTid=setTimeout(()=>{if(cur<curNotes.length){states[cur]='current';setStatus('go');redraw();}},700);}}}else{document.getElementById('det-note').textContent='—';document.getElementById('det-hz').textContent='소리 감지 중...';}}else{document.getElementById('det-hz').textContent='피아노를 쳐보세요 🎵';}rafId=requestAnimationFrame(detectLoop);}
function onComplete(){const b=document.getElementById('done-banner');b.textContent=curSes<totalSes?`🎉 ${curSes}회 완료! 잠깐 쉬고 계속해요!`:`🏆 ${totalSes}회 모두 완료! 정말 잘했어요!`;b.classList.add('show');setStatus('done');doStopMic();if(curSes<totalSes)setTimeout(()=>{curSes++;initSes();},2500);}
async function startMic(){if(listening)return;try{micStream=await navigator.mediaDevices.getUserMedia({audio:true,video:false});audioCtx=new(window.AudioContext||window.webkitAudioContext)();analyser=audioCtx.createAnalyser();analyser.fftSize=2048;audioCtx.createMediaStreamSource(micStream).connect(analyser);listening=true;paused=false;document.getElementById('mic-go-btn').disabled=true;document.getElementById('mic-go-btn').textContent='🎤 연습 중...';document.getElementById('mic-dot').classList.add('on');document.getElementById('mic-lbl').textContent='켜짐';if(cur<curNotes.length){states[cur]='current';redraw();}setStatus('go');startTimer();detectLoop();}catch(e){alert('마이크 권한을 허용해주세요 🎤');}}
function doStopMic(){listening=false;cancelAnimationFrame(rafId);if(micStream){micStream.getTracks().forEach(t=>t.stop());micStream=null;}if(audioCtx){audioCtx.close();audioCtx=null;}const btn=document.getElementById('mic-go-btn');if(btn){btn.disabled=false;btn.textContent='🎤 마이크 켜고 연습 시작';}['mic-dot','mic-lbl','det-note','det-hz'].forEach(id=>{const el=document.getElementById(id);if(!el)return;if(id==='mic-dot')el.classList.remove('on');else if(id==='mic-lbl')el.textContent='꺼짐';else if(id==='det-note')el.textContent='—';else el.textContent='마이크를 켜주세요';});clearTimer();}
function setStatus(t){const box=document.getElementById('sbox'),em=document.getElementById('s-em'),tx=document.getElementById('s-tx');box.className='stat-box';if(t==='ok'){box.classList.add('ok');em.textContent='✅';tx.textContent='맞아요!';}else if(t==='ng'){box.classList.add('ng');em.textContent='❌';tx.textContent='다시 해봐요';}else if(t==='go'){box.classList.add('go');em.textContent='👂';tx.textContent='듣고 있어요~';}else if(t==='done'){box.classList.add('ok');em.textContent='🎉';tx.textContent='완료!';}else{em.textContent='🎵';tx.textContent='시작해볼까요?';}}
function loadVex(){if(typeof Vex!=='undefined'){setTimeout(drawScore,150);return;}const s=document.createElement('script');s.src='https://cdn.jsdelivr.net/npm/vexflow@4.2.2/build/cjs/vexflow.js';s.onload=()=>setTimeout(drawScore,150);s.onerror=()=>{const s2=document.createElement('script');s2.src='https://unpkg.com/vexflow@4.2.2/build/cjs/vexflow.js';s2.onload=()=>setTimeout(drawScore,150);document.head.appendChild(s2);};document.head.appendChild(s);}
window.addEventListener('resize',()=>{if(typeof Vex!=='undefined'&&document.getElementById('pg-prac').classList.contains('active'))drawScore();});
renderCatGrid('book');
</script>

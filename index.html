<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🎹 피아노 연습 도우미</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Jua&family=Nanum+Gothic:wght@400;700;800&display=swap');
  :root {
    --bg: #FFF9F0; --primary: #FF6B6B; --secondary: #4ECDC4;
    --accent: #FFE66D; --correct: #51CF66; --wrong: #FF6B6B;
    --waiting: #74C0FC; --text: #2D3436;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Nanum Gothic', sans-serif; background: var(--bg); min-height: 100vh; display: flex; flex-direction: column; align-items: center; padding: 20px 14px; }
  h1 { font-family: 'Jua', sans-serif; font-size: 1.8rem; color: var(--primary); margin-bottom: 4px; }
  .subtitle { font-size: 0.85rem; color: #888; margin-bottom: 20px; }
  .card { background: #fff; border-radius: 20px; box-shadow: 0 6px 24px rgba(0,0,0,0.09); padding: 20px; width: 100%; max-width: 680px; margin-bottom: 16px; }
  .section-title { font-family: 'Jua', sans-serif; font-size: 1rem; color: var(--text); margin-bottom: 12px; }
  #score-wrap { width: 100%; overflow-x: auto; background: #f8f8f8; border-radius: 12px; min-height: 130px; display: flex; align-items: center; justify-content: center; }
  #score-wrap svg { display: block; max-width: 100%; }
  .note-bar { display: flex; gap: 8px; justify-content: center; margin-top: 14px; flex-wrap: wrap; }
  .note-chip { display: flex; flex-direction: column; align-items: center; gap: 3px; }
  .note-dot { width: 42px; height: 42px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-family: 'Jua', sans-serif; font-size: 1rem; color: #fff; transition: all 0.3s; box-shadow: 0 3px 10px rgba(0,0,0,0.12); }
  .note-dot.waiting { background: var(--waiting); }
  .note-dot.current { background: #f59f00; transform: scale(1.2); box-shadow: 0 0 0 5px rgba(245,159,0,0.25); animation: pulse 1s infinite; }
  .note-dot.correct { background: var(--correct); }
  .note-dot.wrong   { background: var(--wrong); animation: shake 0.4s; }
  .note-label { font-size: 0.7rem; color: #aaa; font-weight: 700; }
  @keyframes pulse { 0%,100%{box-shadow:0 0 0 5px rgba(245,159,0,0.25)} 50%{box-shadow:0 0 0 10px rgba(245,159,0,0.08)} }
  @keyframes shake { 0%,100%{transform:translateX(0)} 25%{transform:translateX(-5px)} 75%{transform:translateX(5px)} }
  .prog-wrap { height: 8px; background: #eee; border-radius: 99px; margin-top: 12px; overflow: hidden; }
  .prog-bar { height: 100%; background: linear-gradient(90deg, var(--secondary), var(--correct)); border-radius: 99px; transition: width 0.4s; width: 0%; }
  .detect-row { display: flex; gap: 12px; flex-wrap: wrap; }
  .detect-box { flex: 1; min-width: 130px; background: linear-gradient(135deg,#f0f8ff,#e8f4fd); border: 2px solid #d0e8f8; border-radius: 14px; padding: 16px; text-align: center; }
  .big-note { font-family: 'Jua', sans-serif; font-size: 2.2rem; color: var(--secondary); }
  .hz-txt { font-size: 0.75rem; color: #aaa; margin-top: 2px; }
  .mic-row { display: flex; align-items: center; justify-content: center; gap: 5px; margin-top: 5px; }
  .mic-dot { width: 9px; height: 9px; border-radius: 50%; background: #ddd; }
  .mic-dot.on { background: #ff4444; animation: blink 0.8s infinite; }
  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.3} }
  .mic-txt { font-size: 0.75rem; color: #aaa; }
  .status-box { flex: 1; min-width: 130px; border-radius: 14px; padding: 16px; text-align: center; transition: all 0.3s; background: #f9f9f9; border: 2px solid #eee; }
  .status-box.ok { background: linear-gradient(135deg,#d3f9d8,#b2f2bb); border-color: #69db7c; }
  .status-box.ng { background: linear-gradient(135deg,#ffe3e3,#ffc9c9); border-color: #ff8787; }
  .status-box.go { background: linear-gradient(135deg,#fff9db,#ffec99); border-color: #ffd43b; }
  .s-emoji { font-size: 1.9rem; }
  .s-text  { font-family: 'Jua', sans-serif; font-size: 0.95rem; margin-top: 3px; color: var(--text); }
  .done-banner { display: none; background: linear-gradient(135deg,#51CF66,#38d9cc); color: #fff; font-family: 'Jua', sans-serif; font-size: 1.3rem; border-radius: 14px; padding: 18px; text-align: center; margin-top: 12px; }
  .done-banner.show { display: block; animation: pop 0.4s; }
  @keyframes pop { from{transform:scale(0.7);opacity:0} to{transform:scale(1);opacity:1} }
  .btns { display: flex; gap: 10px; justify-content: center; flex-wrap: wrap; margin-top: 16px; }
  .btn { font-family: 'Jua', sans-serif; font-size: 0.95rem; border: none; border-radius: 50px; padding: 12px 24px; cursor: pointer; display: flex; align-items: center; gap: 6px; box-shadow: 0 3px 12px rgba(0,0,0,0.10); transition: all 0.2s; }
  .btn:active { transform: scale(0.95); }
  .btn-s { background: linear-gradient(135deg,var(--secondary),#38d9cc); color: #fff; }
  .btn-p { background: linear-gradient(135deg,#868e96,#495057); color: #fff; }
  .btn-r { background: linear-gradient(135deg,var(--accent),#ffd43b); color: var(--text); }
  .tune-row { display: flex; align-items: center; gap: 10px; margin-top: 6px; }
  .tune-row label { font-size: 0.82rem; color: #666; font-weight: 700; min-width: 75px; }
  input[type=range] { flex: 1; accent-color: var(--secondary); }
  .tune-val { font-family: 'Jua', sans-serif; font-size: 0.85rem; color: var(--secondary); min-width: 46px; text-align: right; }
</style>
</head>
<body>
<h1>🎹 피아노 연습 도우미</h1>
<p class="subtitle">악보를 보고 피아노를 쳐보세요!</p>
<div class="card">
  <div class="section-title">🎼 오늘의 악보 — 도레미파솔 (C장조)</div>
  <div id="score-wrap"><p style="color:#bbb;font-size:0.9rem">악보 로딩 중...</p></div>
  <div class="note-bar" id="note-bar"></div>
  <div class="prog-wrap"><div class="prog-bar" id="prog-bar"></div></div>
</div>
<div class="card">
  <div class="section-title">🎤 실시간 음정 감지</div>
  <div class="detect-row">
    <div class="detect-box">
      <div class="big-note" id="det-note">—</div>
      <div class="hz-txt" id="det-hz">마이크를 켜주세요</div>
      <div class="mic-row"><div class="mic-dot" id="mic-dot"></div><span class="mic-txt" id="mic-txt">마이크 꺼짐</span></div>
    </div>
    <div class="status-box" id="sbox">
      <div class="s-emoji" id="s-emoji">🎵</div>
      <div class="s-text" id="s-text">연습 시작!</div>
    </div>
  </div>
  <div class="done-banner" id="done-banner">🎉 완료! 모든 음을 연주했어요! 🎉</div>
</div>
<div class="card">
  <div class="section-title">⚙️ 설정</div>
  <div class="tune-row">
    <label>🎛 조율 보정</label>
    <input type="range" id="tol" min="20" max="100" value="50">
    <div class="tune-val" id="tol-val">±50¢</div>
  </div>
  <div class="btns">
    <button class="btn btn-s" id="btn-s" onclick="startMic()">🎤 마이크 시작</button>
    <button class="btn btn-p" id="btn-p" onclick="stopMic()" disabled>⏹ 중지</button>
    <button class="btn btn-r" onclick="resetAll()">🔄 처음부터</button>
  </div>
</div>
<script>
const NOTES=[{vex:'c/4',label:'도',freq:261.63},{vex:'d/4',label:'레',freq:293.66},{vex:'e/4',label:'미',freq:329.63},{vex:'f/4',label:'파',freq:349.23},{vex:'g/4',label:'솔',freq:392.00}];
let states=NOTES.map(()=>'waiting'),cur=0,listening=false;
let audioCtx,analyser,stream,raf,wrongTid,lastOkTime=0;
function drawScore(){
  const wrap=document.getElementById('score-wrap');
  wrap.innerHTML='';
  if(typeof Vex==='undefined'){wrap.innerHTML='<p style="color:#bbb;padding:16px">악보 로딩 중...</p>';return;}
  try{
    const VF=Vex.Flow,w=Math.max(wrap.clientWidth||320,320);
    const renderer=new VF.Renderer(wrap,VF.Renderer.Backends.SVG);
    renderer.resize(w,150);
    const ctx=renderer.getContext();
    const stave=new VF.Stave(8,18,w-16);
    stave.addClef('treble').addTimeSignature('5/4');
    stave.setContext(ctx).draw();
    const notes=NOTES.map((n,i)=>{
      const sn=new VF.StaveNote({clef:'treble',keys:[n.vex],duration:'q'});
      const c=states[i]==='current'?'#f59f00':states[i]==='correct'?'#2f9e44':states[i]==='wrong'?'#e03131':'#74C0FC';
      sn.setStyle({fillStyle:c,strokeStyle:c});return sn;
    });
    const voice=new VF.Voice({num_beats:5,beat_value:4}).setStrict(false);
    voice.addTickables(notes);
    new VF.Formatter().joinVoices([voice]).format([voice],w-90);
    voice.draw(ctx,stave);
  }catch(e){wrap.innerHTML='<p style="color:#e03131;padding:16px;font-size:0.8rem">오류:'+e.message+'</p>';}
}
function drawBar(){
  const bar=document.getElementById('note-bar');bar.innerHTML='';
  NOTES.forEach((n,i)=>{
    const chip=document.createElement('div');chip.className='note-chip';
    const dot=document.createElement('div');dot.className='note-dot '+states[i];dot.textContent=n.label;
    const lbl=document.createElement('div');lbl.className='note-label';lbl.textContent=n.vex.replace('/','').toUpperCase();
    chip.append(dot,lbl);bar.appendChild(chip);
  });
  document.getElementById('prog-bar').style.width=(states.filter(s=>s==='correct').length/NOTES.length*100)+'%';
}
function redraw(){drawScore();drawBar();}
function detectPitch(buf,sr){
  const half=buf.length>>1;const yin=new Float32Array(half);yin[0]=1;let run=0;
  for(let t=1;t<half;t++){let s=0;for(let j=0;j<half;j++){const d=buf[j]-buf[j+t];s+=d*d;}run+=s;yin[t]=s*t/run;}
  for(let t=2;t<half;t++){if(yin[t]<0.15){while(t+1<half&&yin[t+1]<yin[t])t++;return sr/t;}}
  return -1;
}
function noteFromFreq(f){
  const n=['C','C#','D','D#','E','F','F#','G','G#','A','A#','B'];
  const m=Math.round(12*Math.log2(f/440)+49);
  return n[((m-1)%12+12)%12]+Math.floor((m-1)/12);
}
function loop(){
  if(!listening)return;
  const buf=new Float32Array(analyser.fftSize);analyser.getFloatTimeDomainData(buf);
  let rms=0;for(let v of buf)rms+=v*v;rms=Math.sqrt(rms/buf.length);
  if(rms>0.01){
    const freq=detectPitch(buf,audioCtx.sampleRate);
    if(freq>50&&freq<2000){
      document.getElementById('det-note').textContent=noteFromFreq(freq);
      document.getElementById('det-hz').textContent=freq.toFixed(1)+' Hz';
      if(cur<NOTES.length){
        const cents=Math.abs(1200*Math.log2(freq/NOTES[cur].freq));
        const tol=+document.getElementById('tol').value;
        if(cents<=tol){
          const now=Date.now();
          if(now-lastOkTime>600){
            lastOkTime=now;states[cur]='correct';cur++;clearTimeout(wrongTid);
            if(cur<NOTES.length){states[cur]='current';setStatus('ok');setTimeout(()=>setStatus('go'),700);}
            else{setStatus('done');document.getElementById('done-banner').classList.add('show');stopMic();}
            redraw();
          }
        }else if(states[cur]==='current'){
          states[cur]='wrong';setStatus('ng');redraw();clearTimeout(wrongTid);
          wrongTid=setTimeout(()=>{if(cur<NOTES.length){states[cur]='current';setStatus('go');redraw();}},800);
        }
      }
    }else{document.getElementById('det-note').textContent='—';document.getElementById('det-hz').textContent='소리 감지 중...';}
  }else{document.getElementById('det-hz').textContent='피아노를 쳐보세요 🎵';}
  raf=requestAnimationFrame(loop);
}
async function startMic(){
  try{
    stream=await navigator.mediaDevices.getUserMedia({audio:true});
    audioCtx=new(window.AudioContext||window.webkitAudioContext)();
    analyser=audioCtx.createAnalyser();analyser.fftSize=2048;
    audioCtx.createMediaStreamSource(stream).connect(analyser);
    listening=true;
    document.getElementById('btn-s').disabled=true;
    document.getElementById('btn-p').disabled=false;
    document.getElementById('mic-dot').classList.add('on');
    document.getElementById('mic-txt').textContent='마이크 켜짐';
    if(cur<NOTES.length){states[cur]='current';redraw();}
    setStatus('go');loop();
  }catch(e){alert('마이크 권한을 허용해주세요 🎤');}
}
function stopMic(){
  listening=false;cancelAnimationFrame(raf);
  if(stream)stream.getTracks().forEach(t=>t.stop());
  if(audioCtx)audioCtx.close();
  document.getElementById('btn-s').disabled=false;
  document.getElementById('btn-p').disabled=true;
  document.getElementById('mic-dot').classList.remove('on');
  document.getElementById('mic-txt').textContent='마이크 꺼짐';
  document.getElementById('det-note').textContent='—';
  document.getElementById('det-hz').textContent='마이크를 켜주세요';
  setStatus('idle');
}
function resetAll(){
  stopMic();cur=0;states=NOTES.map(()=>'waiting');
  document.getElementById('done-banner').classList.remove('show');
  setStatus('idle');redraw();
}
function setStatus(t){
  const box=document.getElementById('sbox'),em=document.getElementById('s-emoji'),tx=document.getElementById('s-text');
  box.className='status-box';
  if(t==='ok'){box.classList.add('ok');em.textContent='✅';tx.textContent='맞아요!';}
  else if(t==='ng'){box.classList.add('ng');em.textContent='❌';tx.textContent='다시 해봐요';}
  else if(t==='go'){box.classList.add('go');em.textContent='👂';tx.textContent='듣고 있어요~';}
  else if(t==='done'){box.classList.add('ok');em.textContent='🎉';tx.textContent='완료!';}
  else{em.textContent='🎵';tx.textContent='연습 시작!';}
}
document.getElementById('tol').addEventListener('input',function(){document.getElementById('tol-val').textContent='±'+this.value+'¢';});
window.addEventListener('resize',drawScore);
drawBar();
(function(){
  const s=document.createElement('script');
  s.src='https://cdn.jsdelivr.net/npm/vexflow@4.2.2/build/cjs/vexflow.js';
  s.onload=()=>{setTimeout(redraw,100);};
  s.onerror=()=>{const s2=document.createElement('script');s2.src='https://unpkg.com/vexflow@4.2.2/build/cjs/vexflow.js';s2.onload=()=>{setTimeout(redraw,100);};document.head.appendChild(s2);};
  document.head.appendChild(s);
})();
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="ko" style="background:#FFF8F0;color:#2D3436;color-scheme:light;">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="color-scheme" content="light only">
<title>🎹 JY PIANO 연습실</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Jua&family=Do+Hyeon&family=Nanum+Gothic:wght@400;700&display=swap');
:root{
  --primary:#FF6B6B;--secondary:#4ECDC4;--accent:#FFE66D;
  --correct:#51CF66;--wrong:#FF6B6B;--waiting:#A5D8FF;
  --bg:#FFF8F0;--text:#2D3436;--bar-h:60px;--tab-h:56px;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
body{font-family:'Nanum Gothic',sans-serif;background:var(--bg);min-height:100vh;overflow-x:hidden;}

/* ── 상단 바 ── */
#top-bar{position:fixed;top:0;left:0;right:0;height:var(--bar-h);background:linear-gradient(135deg,#FF6B6B,#FF8E53);display:flex;align-items:center;justify-content:space-between;padding:0 14px;z-index:999;box-shadow:0 3px 16px rgba(255,107,107,0.35);position:fixed;}
.bar-brand{display:flex;flex-direction:column;line-height:1.2;}
.bar-brand .b1{font-family:'Do Hyeon',sans-serif;font-size:1.05rem;color:#2D3436;letter-spacing:1px;}
.bar-brand .b2{font-size:0.62rem;color:#2D3436;letter-spacing:0.5px;}
.bar-right{display:flex;align-items:center;gap:6px;}
#bar-timer{font-family:'Do Hyeon',sans-serif;font-size:1.15rem;color:#2D3436;min-width:48px;text-align:center;letter-spacing:1px;}
#bar-count{background:rgba(255,255,255,0.25);border-radius:20px;padding:3px 9px;font-family:'Jua',sans-serif;font-size:0.72rem;color:#fff;white-space:nowrap;}
.bar-btn{width:30px;height:30px;border-radius:50%;border:none;cursor:pointer;font-size:0.8rem;display:flex;align-items:center;justify-content:center;transition:all 0.2s;box-shadow:0 2px 8px rgba(0,0,0,0.15);}
.bar-btn:active{transform:scale(0.88);}
#bbPlay{background:#fff;color:var(--primary);}
#bbPause{background:rgba(255,255,255,0.28);color:#fff;}
#bbStop{background:rgba(255,255,255,0.18);color:#fff;}

/* ── 하단 탭 바 ── */
#tab-bar{position:fixed;bottom:0;left:0;right:0;height:var(--tab-h);background:#fff;border-top:1px solid #eee;display:flex;z-index:998;box-shadow:0 -3px 16px rgba(0,0,0,0.06);}
.tab-item{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;transition:all 0.2s;gap:3px;border:none;background:none;}
.tab-item .t-ico{font-size:1.3rem;}
.tab-item .t-lbl{font-family:'Jua',sans-serif;font-size:0.68rem;color:#aaa;}
.tab-item.active .t-ico{filter:drop-shadow(0 0 4px currentColor);}
.tab-item.active .t-lbl{color:var(--primary);}
.tab-badge{position:absolute;top:-4px;right:-4px;background:#FF6B6B;color:#fff;border-radius:99px;font-size:0.6rem;font-weight:700;padding:1px 5px;font-family:'Jua',sans-serif;}
.tab-ico-wrap{position:relative;display:inline-block;}

/* ── 페이지 공통 ── */
